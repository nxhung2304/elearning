default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV["DATABASE_URL"] %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "elearning_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_TEST_NAME", "elearning_test") %>

production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("DB_PRODUCTION_NAME", "elearning_production") %>
    username: <%= ENV.fetch("DB_USER", "elearning") %>
    password: <%= ENV["DB_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: elearning_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: elearning_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: elearning_production_cable
    migrations_paths: db/cable_migrate
